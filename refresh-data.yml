name: Refresh market data

on:
  schedule:
    # 5:00 AM SGT = 21:00 UTC (previous day). SGT is UTC+8.
    - cron: '0 21 * * *'
  workflow_dispatch:   # "Run workflow" button in the Actions tab for immediate manual runs

permissions:
  contents: write      # needed to commit the JSON files back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour cap; the full universe takes 2-3 hrs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests openpyxl

      # ── git identity for the commits this workflow makes ──────────────────
      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ═══════════════════════════════════════════════════════════════════════
      # CRITICAL LESSON (see PROJECT_CONTEXT.md): commit after EVERY step.
      # A workflow that fetches 8 sources and commits only at the end loses
      # EVERYTHING if it times out at hour 5. Partial progress is good data.
      # ═══════════════════════════════════════════════════════════════════════

      # ── 1. Core fundamentals (largest step, ~2 hrs for full universe) ─────
      - name: Fetch core fundamentals
        run: python fetch_data.py
        continue-on-error: true   # timeout or Yahoo blip → partial data.json is still useful

      - name: Commit fundamentals
        run: |
          git add data.json custom_tickers.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: fundamentals $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 2. Macro (rates, crude, VIX, USD/INR, India 10Y) ─────────────────
      - name: Fetch macro
        run: python fetch_macro.py
        continue-on-error: true

      - name: Commit macro
        run: |
          git add macro.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: macro $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 3. Analyst estimates + revision momentum ──────────────────────────
      - name: Fetch estimates
        run: python fetch_estimates.py
        continue-on-error: true

      - name: Commit estimates
        run: |
          git add estimates.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: estimates $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 4. Price history + average daily traded value (liquidity) ─────────
      - name: Fetch price history
        run: python fetch_price_history.py
        continue-on-error: true

      - name: Commit price history
        run: |
          git add price_history.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: price_history $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 5. Earnings reactions ─────────────────────────────────────────────
      - name: Fetch earnings reactions
        run: python fetch_reactions.py
        continue-on-error: true

      - name: Commit reactions
        run: |
          git add reactions.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: reactions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 6. US primary-source verification (SEC XBRL) ─────────────────────
      - name: Fetch US verification
        run: python fetch_verify_us.py
        continue-on-error: true

      - name: Commit US verification
        run: |
          git add verify_us.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: verify_us $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 7. India verification (NSE adjusted data) ─────────────────────────
      - name: Fetch India verification
        run: python fetch_verify_in.py
        continue-on-error: true

      - name: Commit India verification
        run: |
          git add verify_in.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: verify_in $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 8. SEC EDGAR earnings press releases ──────────────────────────────
      - name: Fetch EDGAR filings
        run: python fetch_edgar.py
        continue-on-error: true

      - name: Commit EDGAR
        run: |
          git add edgar.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: edgar $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 9. NSE index constituents + industry labels (NEW) ─────────────────
      # Runs weekly (Mon only) — these change infrequently and NSE's servers
      # don't need a daily hit. The cron still fires daily but this step
      # skips on non-Monday runs.
      - name: Fetch NSE classification (weekly — Mondays only)
        if: github.event_name == 'workflow_dispatch' || contains(fromJson('["Monday"]'), steps.dayname.outputs.day)
        run: python fetch_nse_classification.py
        continue-on-error: true

      - name: Get day name
        id: dayname
        run: echo "day=$(date -u '+%A')" >> $GITHUB_OUTPUT

      - name: Commit NSE classification
        run: |
          git add classification.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: nse_classification $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── 10. Promoter pledging (NEW) ───────────────────────────────────────
      # NSE's pledge disclosure API is finicky; continue-on-error is critical.
      # Runs weekly (Mon only) — disclosures are quarterly filings.
      - name: Fetch promoter pledging (weekly — Mondays only)
        if: github.event_name == 'workflow_dispatch' || steps.dayname.outputs.day == 'Monday'
        run: python fetch_pledging.py
        continue-on-error: true

      - name: Commit pledging
        run: |
          git add pledging.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: pledging $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "=== Refresh complete $(date -u '+%Y-%m-%d %H:%M UTC') ==="
          echo "Files present:"
          ls -lh *.json 2>/dev/null | awk '{print $5, $9}' || echo "none"
          echo ""
          echo "If any step shows 'Error' above, its JSON from the previous"
          echo "run is still live — the dashboard degrades gracefully."
