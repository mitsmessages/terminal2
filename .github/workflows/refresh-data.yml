name: Refresh market data

on:
  schedule:
    - cron: "0 20 * * *"   # daily 20:00 UTC = 04:00 SGT (UTC+8)
  workflow_dispatch: {}     # "Run workflow" button for immediate manual runs

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6-hour cap; full universe takes 2-3 hrs

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4 openpyxl

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # CRITICAL: commit after EVERY step.
      # A workflow that commits only at the end loses EVERYTHING on timeout.

      # 1. Core fundamentals (~2 hrs for full universe)
      - name: Fetch core fundamentals
        run: python fetch_data.py
        continue-on-error: true

      - name: Commit fundamentals
        run: |
          git add data.json custom_tickers.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: fundamentals $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 2. Macro — fast ~10s
      - name: Fetch macro
        run: python fetch_macro.py
        continue-on-error: true

      - name: Commit macro
        run: |
          git add macro.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: macro $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 3. Analyst estimates — feeds DCF growth; full universe
      - name: Fetch estimates
        run: |
          python -c "import fetch_estimates; fetch_estimates.main(use_test_list=False)" || echo "Estimates fetch failed, continuing"
        continue-on-error: true

      - name: Commit estimates
        run: |
          git add estimates.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: estimates $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 4. US verification (SEC XBRL)
      - name: Fetch US verification
        run: |
          python -c "import fetch_verify_us; fetch_verify_us.main(use_test_list=False)" || echo "US verification failed, continuing"
        continue-on-error: true

      - name: Commit US verification
        run: |
          git add verify_us.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: verify_us $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 5. India verification (NSE)
      - name: Fetch India verification
        run: |
          python -c "import fetch_verify_in; fetch_verify_in.main(use_test_list=False)" || echo "NSE verification failed, continuing"
        continue-on-error: true

      - name: Commit India verification
        run: |
          git add verify_in.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: verify_in $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 6. Price history + ADV liquidity data (weekly Saturdays)
      - name: Fetch price history
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "6" ] || [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            python -c "import fetch_price_history; fetch_price_history.main(use_test_list=False)" || echo "Price history fetch failed, continuing"
          else
            echo "Skipping price history (runs Saturdays UTC = Sundays 4am SGT)"
          fi
        continue-on-error: true

      - name: Commit price history
        run: |
          git add price_history.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: price_history $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 7. EDGAR earnings press releases (weekly Saturdays)
      - name: Fetch EDGAR
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "6" ] || [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            python -c "import fetch_edgar; fetch_edgar.main(use_test_list=False)" || echo "EDGAR fetch failed, continuing"
          else
            echo "Skipping EDGAR (runs Saturdays UTC = Sundays 4am SGT)"
          fi
        continue-on-error: true

      - name: Commit EDGAR
        run: |
          git add edgar_transcripts.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: edgar $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 8. Earnings reactions (weekly Saturdays, depends on EDGAR)
      - name: Fetch earnings reactions
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "6" ] || [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            python fetch_reactions.py || echo "Skipped - edgar_transcripts.json not ready"
          else
            echo "Skipping reactions (runs Saturdays UTC = Sundays 4am SGT)"
          fi
        continue-on-error: true

      - name: Commit reactions
        run: |
          git add reactions.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: reactions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 9. NSE index constituents (NEW — weekly Mondays only)
      - name: Fetch NSE classification
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ] || [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            python fetch_nse_classification.py || echo "NSE classification failed (endpoint may have changed), continuing"
          else
            echo "Skipping NSE classification (runs Mondays UTC)"
          fi
        continue-on-error: true

      - name: Commit NSE classification
        run: |
          git add classification.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: nse_classification $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # 10. Promoter pledging (NEW — weekly Mondays only)
      - name: Fetch promoter pledging
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ] || [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            python fetch_pledging.py || echo "Pledging fetch failed (NSE API may have changed), continuing"
          else
            echo "Skipping pledging (runs Mondays UTC)"
          fi
        continue-on-error: true

      - name: Commit pledging
        run: |
          git add pledging.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: pledging $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Print summary
        run: |
          echo "=== Refresh complete $(date -u '+%Y-%m-%d %H:%M UTC') ==="
          ls -lh *.json 2>/dev/null | awk '{print $5, $9}' || echo "no JSON files"
